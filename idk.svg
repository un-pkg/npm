<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="background:#0d1117; color:#d1d5db; font-family:monospace; height:100%; display:flex; flex-direction:column; border:1px solid #30363d; border-radius:8px;">
      
      <style>
        input { display: none; }
        .cursor { border-left: 8px solid #10a37f; animation: blink 1s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* The "Typing" Logic */
        .text-line::after { content: ""; color: #10a37f; }
        #k1:checked ~ * .text-line::after { content: "H"; }
        #k2:checked ~ * .text-line::after { content: "HE"; }
        #k3:checked ~ * .text-line::after { content: "HEL"; }
        #k4:checked ~ * .text-line::after { content: "HELL"; }
        #k5:checked ~ * .text-line::after { content: "HELLO"; }

        .key { 
          padding: 5px 10px; background: #21262d; border: 1px solid #30363d; 
          cursor: pointer; border-radius: 4px; font-size: 12px;
        }
        .key:active { background: #30363d; }

        /* Only show the next key in the sequence */
        .keys label { display: none; }
        #start:checked ~ .keys label[for="k1"] { display: inline-block; }
        #k1:checked ~ .keys label[for="k1"] { display: none; }
        #k1:checked ~ .keys label[for="k2"] { display: inline-block; }
        #k2:checked ~ .keys label[for="k2"] { display: none; }
        #k2:checked ~ .keys label[for="k3"] { display: inline-block; }
        #k3:checked ~ .keys label[for="k3"] { display: none; }
        #k3:checked ~ .keys label[for="k4"] { display: inline-block; }
      </style>

      <input type="radio" id="start" checked="checked" />
      <input type="checkbox" id="k1" />
      <input type="checkbox" id="k2" />
      <input type="checkbox" id="k3" />
      <input type="checkbox" id="k4" />
      <input type="checkbox" id="k5" />

      <div style="background:#21262d; padding:12px; border-bottom:1px solid #30363d; font-weight:bold;">
        <span style="color:#10a37f;">●</span> AI_TERMINAL_PROMPT
      </div>

      <div style="flex:1; padding:20px; font-size:16px;">
        <div style="margin-bottom:10px; color:#8e8ea0;">&gt; USER_INPUT:</div>
        <div style="display:flex; align-items:center; background:#161b22; padding:15px; border-radius:5px; border:1px solid #30363d;">
          <span class="text-line"></span><span class="cursor"></span>
        </div>
        
        <div style="margin-top:20px; color:#10a37f;">
          &gt; AI_STATUS: <span style="color:#d1d5db;">READY_FOR_SEQUENCE</span>
        </div>
      </div>

      <div style="padding:20px; background:#161b22; border-top:1px solid #30363d; text-align:center;">
        <div class="keys">
          <label for="k1" class="key">TAP TO TYPE 'H'</label>
          <label for="k2" class="key">TAP TO TYPE 'E'</label>
          <label for="k3" class="key">TAP TO TYPE 'L'</label>
          <label for="k4" class="key">TAP TO TYPE 'L'</label>
          <label for="k5" class="key">TAP TO TYPE 'O'</label>
        </div>
        
        <div style="margin-top:15px;">
           <a href="https://github.com/freebuisness/freebuisness.github.io/issues/new?title=AI_EXECUTE" 
              style="color:#10a37f; text-decoration:none; font-size:12px;">[ EXECUTE_COMMAND ]</a>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
